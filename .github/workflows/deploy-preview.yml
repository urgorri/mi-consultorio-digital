name: Deploy and Preview

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

      - name: Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            test-results/
            playwright-report/
            npm-debug.log
          if-no-files-found: ignore

  deploy-preview:
    name: Deploy Preview
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Deploy to Preview
        id: deploy
        run: |
          # Simulating a preview deployment
          # In a real scenario, this would be:
          # vercel deploy --prebuilt ./dist
          # or similar
          echo "PREVIEW_URL=https://preview-${{ github.event.pull_request.number }}.example.com" >> $GITHUB_OUTPUT
          echo "Preview deployment successful"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment ready!\n\n**URL:** [${{ steps.deploy.outputs.PREVIEW_URL }}](${{ steps.deploy.outputs.PREVIEW_URL }})\n\nBuild validated and ready for review.`
            })

  deploy-release:
    name: Deploy to Production
    needs: build-and-test
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.example.com
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Deploy to Production
        run: |
          # Simulating production deployment using the validated build
          # In a real scenario, this would use secrets like:
          # deploy-to-prod --token ${{ secrets.DEPLOY_TOKEN }} ./dist
          echo "Deploying to production environment..."
          echo "Deployment successful"
