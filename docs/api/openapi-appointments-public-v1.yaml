openapi: 3.1.0
info:
  title: Appointments Public API
  version: 1.1.0
  description: Contrato OpenAPI para /api/appointments-public/v1.
  x-api-lifecycle:
    deprecated: false
    minimumNoticeDays: 180
servers:
  - url: /api/appointments-public/v1
paths:
  /availability:
    get:
      operationId: availability
      parameters:
        - in: query
          name: professionalId
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: OK
  /reservations:
    post:
      operationId: reservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationsRequest'
      responses:
        '200':
          description: Reserva creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
  /reservations/token/{token}:
    get:
      operationId: tokenStatus
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Estado de reserva
  /reservations/token/{token}/confirm:
    post:
      operationId: confirm
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Reserva confirmada
  /reservations/token/{token}/cancel:
    post:
      operationId: cancel
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Reserva cancelada
components:
  schemas:
    PatientData:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        documentNumber: { type: string }
        documentType: { type: string, enum: [dni, pasaporte, cedula, otro] }
      required: [firstName, lastName, email, phone, documentNumber, documentType]
    ReservationsRequest:
      type: object
      properties:
        patientId: { type: string }
        patientData: { $ref: '#/components/schemas/PatientData' }
        professionalId: { type: string }
        date: { type: string, format: date }
        time: { type: string, pattern: '^\d{2}:\d{2}$' }
        endTime: { type: string, pattern: '^\d{2}:\d{2}$' }
        clinicId: { type: string, nullable: true }
      required: [professionalId, date, time, endTime]
      oneOf:
        - required: [patientId]
        - required: [patientData]
    ReservationResponse:
      type: object
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          properties:
            id: { type: string }
            status: { type: string }
      required: [success, data]
    PublicError:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          properties:
            code:
              type: string
              enum: [TOKEN_EXPIRED, TOKEN_INVALID, VALIDATION_ERROR, RATE_LIMITED]
            message:
              type: string
            details:
              type: object
              properties:
                correlationId:
                  type: string
      required: [success, error]
